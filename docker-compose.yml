services:
  marihella-vintage:
    build: .
    container_name: marihella-vintage
    restart: unless-stopped
    networks:
      - proxy
    labels:
      traefik.enable: "true"

      # ── Router ──────────────────────────────────────────────────────────────
      traefik.http.routers.marihella-vintage.rule: "Host(`${DOMAIN}`)"
      traefik.http.routers.marihella-vintage.entrypoints: "websecure"
      traefik.http.routers.marihella-vintage.tls: "true"
      traefik.http.routers.marihella-vintage.tls.certresolver: "letsencrypt"

      # ── Middlewares ──────────────────────────────────────────────────────────
      traefik.http.routers.marihella-vintage.middlewares: "sec-headers@file"

      # ── Service ─────────────────────────────────────────────────────────────
      traefik.http.services.marihella-vintage.loadbalancer.server.port: "80"

networks:
  proxy:
    external: true
