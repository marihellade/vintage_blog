services:
  marihella-blog:
    build: .
    container_name: marihella-blog
    restart: unless-stopped
    networks:
      - proxy
    labels:
      traefik.enable: "true"

      # ── CHANGE THIS to your actual domain ──
      traefik.http.routers.marihella.rule: "Host(`marihella.example.com`)"
      traefik.http.routers.marihella.entrypoints: websecure
      traefik.http.routers.marihella.tls.certresolver: letsencrypt

      traefik.http.services.marihella.loadbalancer.server.port: "80"

networks:
  proxy:
    name: proxy
    external: true
