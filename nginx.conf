server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed files if available
    gzip_static on;

    # Clean URLs — try .html extension for extensionless paths
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Static assets — long cache
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images — moderate cache
    location ~* \.(png|jpg|jpeg|gif|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Don't cache HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
